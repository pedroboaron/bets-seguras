services:
  bets-seguras:
    image: ghcr.io/pedroboaron/bets-seguras:latest
    container_name: bets-seguras
    restart: unless-stopped
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      # Intervalos de refresh (segundos)
      - REFRESH_INTERVAL_SECONDS=300
      - TODAY_REFRESH_SECONDS=120
      - FUTURE_REFRESH_SECONDS=3600
    # Limita recursos para não sobrecarregar o TrueNAS
    deploy:
      resources:
        limits:
          memory: 768M
